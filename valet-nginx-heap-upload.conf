# Valet/Nginx: Allow large heap snapshot uploads (fix 413 Content Too Large)
# Add this line inside the server { } block of your site's Nginx config.
#
# 1. Find your site config:
#    - Valet:  ~/.config/valet/Nginx/your-site.test
#    - Herd:   ~/Library/Application Support/Herd/config/nginx/
#
# 2. Add this line inside the server { } block (before any location blocks):
#    client_max_body_size 100M;
#
# 3. Restart:
#    - Valet:  valet restart
#    - Herd:   herd restart (or restart from Herd app)
#
# Example server block after edit:
#
# server {
#     listen 80;
#     server_name baakh.test;
#     client_max_body_size 100M;   # <-- ADD THIS LINE
#     root /path/to/Baakh/public;
#     ...
# }

client_max_body_size 100M;
