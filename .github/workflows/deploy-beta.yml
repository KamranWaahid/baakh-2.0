name: Deploy to Beta

on:
  push:
    branches:
      - beta

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install NPM dependencies and build
        run: |
          npm ci
          npm run build

      - name: Verify built Vite assets
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const buildPath = path.join(process.cwd(), 'public', 'build');
          const manifestPath = path.join(buildPath, 'manifest.json');
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          const missing = new Set();

          for (const entry of Object.values(manifest)) {
            if (!entry || typeof entry !== 'object') continue;
            for (const key of ['file', 'css', 'assets']) {
              for (const file of [entry[key]].flat()) {
                if (typeof file === 'string' && file && !fs.existsSync(path.join(buildPath, file))) {
                  missing.add(file);
                }
              }
            }
          }

          if (missing.size) {
            console.error('Vite manifest references missing files:');
            for (const file of missing) console.error(` - ${file}`);
            process.exit(1);
          }

          console.log('Verified Vite manifest and built assets.');
          NODE

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./
          state-name: .ftp-deploy-sync-state.json
          # Do not exclude public/build; Laravel serves Vite assets from /build/*.
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/vendor/**
            **/tests/**
            **/storage/**
            !**/storage/.htaccess
            **/*.txt
            **/*.log
            **/*.sql
            **/phpunit.xml
            **/.env.example
            **/.env
            **/README.md
